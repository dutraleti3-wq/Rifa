<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Dia das Mães</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(to bottom right, #ffe6f0, #f3e6ff);
    text-align:center;
}

header{
    padding:40px;
    background: linear-gradient(to right, #ffb6d9, #e6b3ff);
    color:white;
}

.grid{
    display:grid;
    grid-template-columns: repeat(10, 1fr);
    gap:8px;
    padding:20px;
}

.number{
    background:white;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.number:hover{
    background:#f8bbd0;
}

.selected{
    background:#ff80ab !important;
    color:white;
}

.sold{
    background:#9e9e9e !important;
    color:white;
    cursor:not-allowed;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:20px;
    margin:10px;
    cursor:pointer;
}

.btn-pay{
    background:#4caf50;
    color:white;
}

.btn-whats{
    background:white;
    border:2px solid #9c27b0;
    color:#9c27b0;
}
</style>
</head>

<body>

<header>
<h1>💖 Rifa Dia das Mães 💖</h1>
<p>Escolha seus números 💕</p>
<p>📅 Sorteio: 07/05</p>
</header>

<div class="grid" id="grid"></div>

<div>
<button class="btn-pay" onclick="pagar()">💳 Pagar Agora</button>
<button class="btn-whats" onclick="enviarWhats()">🟢 Reservar no WhatsApp</button>
</div>

<script>
const total = 100;
let selected = [];
let vendidos = JSON.parse(localStorage.getItem("vendidos")) || [];

const grid = document.getElementById("grid");

for(let i=1;i<=total;i++){
    const div = document.createElement("div");
    div.classList.add("number");
    div.innerText = i;

    if(vendidos.includes(i)){
        div.classList.add("sold");
    }

    div.onclick = () => {
        if(vendidos.includes(i)) return;

        if(selected.includes(i)){
            selected = selected.filter(n => n !== i);
            div.classList.remove("selected");
        } else {
            selected.push(i);
            div.classList.add("selected");
        }
    };

    grid.appendChild(div);
}

function enviarWhats(){
    if(selected.length === 0){
        alert("Escolha pelo menos um número!");
        return;
    }

    const numero = "55499988732255";
    const msg = `Olá! Quero reservar esses números da rifa: ${selected.join(", ")}`;

    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

function pagar(){
    if(selected.length === 0){
        alert("Escolha pelo menos um número!");
        return;
    }

    const chavePix = "d123d204-e146-4eac-bf17-107da1762010";
    const msg = `Chave Pix: ${chavePix}\nNúmeros escolhidos: ${selected.join(", ")}`;

    alert("Copie e pague via Pix:\n\n" + msg);
}

// ADMIN
function marcarComoVendido(numeros){
    vendidos = [...vendidos, ...numeros];
    localStorage.setItem("vendidos", JSON.stringify(vendidos));
    location.reload();
}

let senha = prompt("Senha admin:");
if(senha === "1234"){
    let nums = prompt("Números pagos (ex: 1, 5, 20):");
    if(nums){
        let lista = nums.split(",").map(n => parseInt(n.trim()));
        marcarComoVendido(lista);
    }
}
</script>

</body>
</html>
