<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifa Profissional</title>
  <style>
    body { font-family: Arial; background: #f3e8ff; margin: 0; text-align: center; }
    header { background: #a855f7; color: white; padding: 15px; }
    .container { padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(10,1fr); gap:10px; max-width:500px; margin:20px auto; }
    .number { padding: 12px; border-radius: 8px; border:2px solid #a855f7; background:white; cursor:pointer; }
    .selected { background:#c084fc; color:white; }
    .sold { background:#ddd; color:#666; cursor:not-allowed; }
    input { padding:8px; margin:5px; border-radius:6px; border:1px solid #ccc; }
    button { padding:10px; margin:5px; border:none; border-radius:6px; background:#a855f7; color:white; cursor:pointer; }
    .painel { margin-top:30px; background:white; padding:15px; border-radius:10px; max-width:500px; margin-left:auto; margin-right:auto; }
  </style>
</head>
<body><header>🎁 Rifa Dia das Mães - R$5</header><div class="container">
  <h3>💜 Cesta de Guloseimas</h3>  <div class="grid" id="grid"></div>  <p>Selecionados: <span id="sel">Nenhum</span></p>
  <p>Total: R$ <span id="total">0</span></p><button onclick="enviarWhats()">Reservar via WhatsApp</button>

</div><div class="painel">
  <h3>🔐 Painel Administrativo</h3>
  <input id="nome" placeholder="Nome do comprador">
  <input id="zap" placeholder="WhatsApp">
  <br>
  <button onclick="confirmarVenda()">Confirmar venda</button>
  <button onclick="resetar()">Resetar tudo</button>  <p id="resumo"></p>
</div><script>
let selected = [];
let dados = JSON.parse(localStorage.getItem("rifaDados")) || {};

const grid = document.getElementById("grid");

function salvar() {
  localStorage.setItem("rifaDados", JSON.stringify(dados));
}

function render() {
  grid.innerHTML = "";

  for (let i=1;i<=100;i++){
    let div = document.createElement("div");
    div.innerText = i;
    div.className = "number";

    if(dados[i]){
      div.classList.add("sold");
    } else {
      div.onclick = ()=>{
        if(selected.includes(i)){
          selected = selected.filter(n=>n!==i);
          div.classList.remove("selected");
        } else {
          selected.push(i);
          div.classList.add("selected");
        }
        atualizar();
      }
    }

    grid.appendChild(div);
  }

  atualizarResumo();
}

function atualizar(){
  document.getElementById("sel").innerText = selected.length?selected.join(", "):"Nenhum";
  document.getElementById("total").innerText = selected.length*5;
}

function confirmarVenda(){
  if(selected.length===0) return alert("Selecione números");

  let nome = document.getElementById("nome").value;
  let zap = document.getElementById("zap").value;

  selected.forEach(n=>{
    dados[n] = {nome,zap};
  });

  salvar();
  selected=[];
  document.getElementById("nome").value="";
  document.getElementById("zap").value="";
  render();
}

function atualizarResumo(){
  let vendidos = Object.keys(dados).length;
  document.getElementById("resumo").innerText = `Vendidos: ${vendidos}/100`;
}

function enviarWhats(){
  if(selected.length===0) return alert("Selecione números");

  let msg = `Olá! Quero os números: ${selected.join(", ")} - Total R$${selected.length*5}`;
  let url = `https://wa.me/5549988732255?text=${encodeURIComponent(msg)}`;
  window.open(url);
}

function resetar(){
  if(confirm("Tem certeza?")){
    localStorage.clear();
    dados={};
    render();
  }
}

render();
</script></body>
</html>
